<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitals - URL Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Capitals</h1>
            <p>Unrestricted Web Access</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off">
                <button id="goBtn">GO</button>
                <button id="settingsBtn" class="settings-btn">⚙️</button>
            </div>

            <div class="shortcuts">
                <h3>Quick Links</h3>
                <div class="shortcuts-grid">
                    <button class="shortcut" data-url="https://www.google.com">Google</button>
                    <button class="shortcut" data-url="https://www.youtube.com">YouTube</button>
                    <button class="shortcut" data-url="https://www.reddit.com">Reddit</button>
                    <button class="shortcut" data-url="https://www.github.com">GitHub</button>
                    <button class="shortcut" data-url="https://www.twitter.com">Twitter</button>
                    <button class="shortcut" data-url="https://www.discord.com">Discord</button>
                </div>
            </div>

            <div id="result" class="result"></div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn">&times;</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="general">General</button>
                <button class="tab-btn" data-tab="privacy">Privacy</button>
                <button class="tab-btn" data-tab="appearance">Appearance</button>
                <button class="tab-btn" data-tab="advanced">Advanced</button>
            </div>

            <!-- General Tab -->
            <div id="general" class="tab-content active">
                <div class="setting">
                    <label for="searchEngine">Default Search Engine:</label>
                    <select id="searchEngine">
                        <option value="google">Google</option>
                        <option value="bing">Bing</option>
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="yahoo">Yahoo</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="cacheToggle">
                        <input type="checkbox" id="cacheToggle"> Enable Caching
                    </label>
                </div>
                <div class="setting">
                    <label for="refreshInterval">Auto-Refresh Interval (seconds):</label>
                    <input type="number" id="refreshInterval" min="0" value="0" placeholder="0 = disabled">
                </div>
            </div>

            <!-- Privacy Tab -->
            <div id="privacy" class="tab-content">
                <div class="setting">
                    <label for="adBlocking">
                        <input type="checkbox" id="adBlocking"> Block Ads
                    </label>
                </div>
                <div class="setting">
                    <label for="trackerBlocking">
                        <input type="checkbox" id="trackerBlocking"> Block Trackers
                    </label>
                </div>
                <div class="setting">
                    <label for="disableJS">
                        <input type="checkbox" id="disableJS"> Disable JavaScript
                    </label>
                </div>
                <div class="setting">
                    <label for="userAgentSpoof">
                        <input type="checkbox" id="userAgentSpoof"> Spoof User Agent
                    </label>
                </div>
                <div class="setting">
                    <button id="clearCookies" class="btn-secondary">Clear Cookies & Data</button>
                </div>
            </div>

            <!-- Appearance Tab -->
            <div id="appearance" class="tab-content">
                <div class="setting">
                    <label for="theme">Theme:</label>
                    <select id="theme">
                        <option value="auto">Auto (System)</option>
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="fontSize">Font Size:</label>
                    <select id="fontSize">
                        <option value="small">Small</option>
                        <option value="normal" selected>Normal</option>
                        <option value="large">Large</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="compactMode">
                        <input type="checkbox" id="compactMode"> Compact Mode
                    </label>
                </div>
            </div>

            <!-- Advanced Tab -->
            <div id="advanced" class="tab-content">
                <div class="setting">
                    <label for="customProxy">Custom Proxy URL:</label>
                    <input type="text" id="customProxy" placeholder="https://api.allorigins.win/get?url=">
                </div>
                <div class="setting">
                    <label for="corsToggle">
                        <input type="checkbox" id="corsToggle" checked> CORS Bypass
                    </label>
                </div>
                <div class="setting">
                    <label for="timeout">Request Timeout (ms):</label>
                    <input type="number" id="timeout" min="1000" max="120000" value="30000">
                </div>
                <div class="setting">
                    <label for="debugMode">
                        <input type="checkbox" id="debugMode"> Debug Mode
                    </label>
                </div>
                <div class="setting">
                    <button id="exportSettings" class="btn-secondary">Export Settings</button>
                    <button id="importSettings" class="btn-secondary">Import Settings</button>
                    <input type="file" id="settingsFile" accept=".json" style="display: none;">
                </div>
            </div>

            <div class="modal-footer">
                <button id="saveSettings" class="btn-primary">Save Settings</button>
                <button id="closeSettings" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
